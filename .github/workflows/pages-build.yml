---
name: Build and Deploy Documentation
on:
  push:
    branches: [main]
    paths:
      - "Formula/**"
      - "docs/**"
      - "scripts/**"
      - "theme/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write # required by actions/deploy-pages to publish the Pages deployment
      id-token: write # required by actions/deploy-pages for OIDC authentication

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0

      - name: Setup project dependencies and build site
        shell: bash
        run: |
          make setup
          make build
          echo "Generated formulae.json with $(jq '.formulae | length' docs/_data/formulae.json) formulae"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

  deploy:
    name: Deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      pages: write # required by actions/deploy-pages to publish the Pages deployment
      id-token: write # required by actions/deploy-pages for OIDC authentication

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
