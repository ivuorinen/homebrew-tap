---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_ENV_HINTS: 1
  # Tap trust enforcement (Homebrew/brew#22470) makes `brew doctor` fail in
  # `brew test-bot` for the tap under test. Opt out to keep CI green.
  # See https://github.com/Homebrew/brew/issues/22494
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          bundler-cache: true

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@097625b28a26ba4b7437926ab03b4d3bd2e6c3d1 # main

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        shell: bash
        run: brew install-bundler-gems

      - name: Setup project dependencies
        shell: bash
        run: make setup

      - name: Run brew test-bot (cleanup)
        shell: bash
        run: brew test-bot --only-cleanup-before

      - name: Run brew test-bot (setup)
        shell: bash
        run: brew test-bot --only-setup

      - name: Run brew test-bot (tap syntax)
        shell: bash
        run: brew test-bot --only-tap-syntax

      - name: Check for real formulae (non-examples)
        id: check-formulae
        shell: bash
        run: |
          # Count formulae that are not example formulae
          REAL_FORMULAE=$(find Formula -name "*.rb" ! -name "example-*.rb" | wc -l | tr -d ' ')
          echo "real_formulae_count=$REAL_FORMULAE" >> "$GITHUB_OUTPUT"
          echo "Found $REAL_FORMULAE real formulae (excluding examples)"

      - name: Run brew test-bot (formulae)
        if: github.event_name == 'pull_request' && steps.check-formulae.outputs.real_formulae_count > 0
        shell: bash
        run: brew test-bot --only-formulae

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bottles_${{ matrix.os }}
          path: "*.bottle.*"
